name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov coverage ruff mypy vulture httpx
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy app rag
      - name: Test
        run: python -m pytest --cov=app --cov=rag --cov-fail-under=90
      - name: Scorecard
        run: python eval/scorecard.py
